## Chapter 1: System Architecture & Design Philosophy

### 1.1 Atomic Design Methodology in Vue 3
The SmartLib OS frontend architecture adopts the **Atomic Design** philosophy to ensure scalability, reusability, and maintainability. Components are strictly categorized into five hierarchical levels, though for the scope of this implementation, we focus on the first three: Atoms, Molecules, and Organisms.

#### Hierarchy Implementation Map

| Level | Component | Functional Description |
|-------|-----------|------------------------|
| **Atoms** | `UserAvatar.vue` | A singular display unit representing user identity. |
| **Atoms** | `BaseModal.vue` | The foundation for all overlay interactions. |
| **Atoms** | `EmptyState.vue` | A fallback component for null data states. |
| **Molecules** | `BookCard.vue` | Combines `Atoms` with interactive status logic. |
| **Molecules** | `StatsGrid.vue` | A composite component for data aggregation. |
| **Organisms** | `Sidebar.vue` | Navigation and Identity management orchestrator. |
| **Organisms** | `DashboardHeader.vue` | Manages Global Search, Notifications, and Profile. |
| **Organisms** | `BookGrid.vue` | Primary life-cycle orchestrator for book record sets. |

---

### 1.2 The 'Slate & Emerald' Design System
The design philosophy centers on **Visual Professionalism**. Pairing a deep Slate base with Emerald accents creates a futuristic, high-contrast environment.

#### Design Token Specification

| Token | CSS Variable | Hex Code | WCAG Rationale |

| **Core Brand** | `emerald-500` | `#10b981` | > 4.5:1 ratio against Slate-900. |

## Chapter 2: State Management & Data Flow (The Pinia Layer)

### 2.1 Recursive Store Architecture

```mermaid
graph TD
    UI[uiStore] -->|Triggers| Sidebar[Sidebar Overlay State]
    UI -->|Stores| Notifications[Notification Stack]
    Auth[authStore] -->|Provides| User[User Identity]
    Auth -->|Persists| Avatar[Base64 Profile Picture]
    Book[bookStore] -->|Consumes| User
    Book -->|Manages| Books[Library Inventory]
    Book -->|Filters| Search[Reactive Search Query]
    Book -->|Calculates| Stats[Inventory Metrics]
```

### 2.2 Persistence & State Hydration Algorithm
The state hydration process is handled by a custom `useStorage` composable.

$$ S_{t+1} = \text{Serialize}(\text{Reactive\_Proxy}(S_t)) \implies \text{LocalStorage}.set(Key, S_{t+1}) $$

### 2.3 The 'Borrow/Return' Transaction Logic

**Logic Proof for Return Calculation:**
Let $T_{now}$ be the current Unix timestamp. The return deadline $T_{return}$ is defined as:
$$ T_{return} = T_{now} + (14 \times 24 \times 60 \times 60 \times 1000) $$

## Chapter 3: AI Intelligence Layer (Gemini 3 Pro Integration)

### 3.1 Asynchronous Metadata Queue Algorithm
SmartLib OS offloads intensive metadata generation to the Gemini 3 Pro / Flash models using an asynchronous, non-blocking queue pattern to maintain a 60fps UI.

### 3.2 Prompt Engineering Specifications

| Operation | System Instruction | Prompt Template |
|-------|--------------------|-----------------|
| **Summarization** | `You are a professional librarian.` | `Title: {title} \n Author: {author} \n Provide summary.` |
| **Analytics** | `You are an expert Data Analyst.` | `Library Data Snapshot... Provide summary.` |

## Chapter 4: Frontend Engineering & Performance

### 4.1 Adaptive Breakpoint Logic
The sidebar state $S_{view}$ is defined as:
$$ S_{view} = \begin{cases} \text{Fixed Overlay} & W_{vp} < 768px \\ \text{Relative Column} & W_{vp} \geq 768px \end{cases} $$

### 4.2 Rendering Performance
- **List Reconciliation**: Unique `:key` bindings for stable patches.
- **Reactive Caching**: Cached `computed` properties for complex stats.

### 4.3 Global Shortcut System
The trigger $F_{search}$ is activated if:
$$ (\text{Key} = 'K') \land (\text{Ctrl} \lor \text{Meta}) = \text{True} $$

## Chapter 5: Analytics & Data Visualization

### 5.1 Analytics Data Parsing Algorithms
The system parses the `books` array for frequency aggregation:
$$ P(c) = \frac{n_c}{\sum_{i=1}^{k} n_i} $$

### 5.2 Availability Calculation Logic
The percentage of available inventory $A_{pct}$ is proven by:
$$ A_{pct} = \left( \frac{|\{b \in B : b_{isAvailable} = \text{True}\}|}{|B|} \right) \times 100 $$

<script>
    // Initialize Mermaid
    mermaid.initialize({ startOnLoad: false });

    async function render() {
        const source = document.getElementById('markdown-source').innerText;
        const target = document.getElementById('content');
        
        // Render Markdown
        target.innerHTML = marked.parse(source);

        // Render Mermaid
        const mermaids = document.querySelectorAll('pre code.language-mermaid');
        for (let i = 0; i < mermaids.length; i++) {
            const m = mermaids[i];
            const graphDefinition = m.innerText;
            const container = document.createElement('div');
            container.className = 'mermaid';
            const id = 'mermaid-' + i;
            
            const { render } = await mermaid.render(id, graphDefinition);
            container.innerHTML = render;
            m.parentElement.replaceWith(container);
        }

        // Trigger MathJax
        if (window.MathJax) {
            MathJax.typeset();
        }
    }

    window.onload = render;
</script>
